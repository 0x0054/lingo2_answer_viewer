:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#7fff6e;--accent2:#6eb5ff;--text:#e8e8f0;--muted:#555570;--panel-bg:#13131c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Space Mono",monospace;font-size:15px;min-height:100vh;display:flex;flex-direction:column}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
header{padding:24px 32px 16px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:16px}
header h1{font-family:"Syne",sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:-0.02em;color:var(--accent)}
header span{color:var(--muted);font-size:0.85rem}
.layout{display:grid;grid-template-columns:290px 1fr;flex:1}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:calc(100vh - 67px);overflow-y:auto}
.search-box{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.search-box input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:"Space Mono",monospace;font-size:0.9rem;padding:10px 12px;outline:none;transition:border-color 0.15s}
.search-box input[type=text]:focus{border-color:var(--accent)}
.search-box input[type=text]::placeholder{color:var(--muted)}
.search-toggle{display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--muted);cursor:pointer;user-select:none}
.search-toggle input{accent-color:var(--accent);cursor:pointer}
.map-list{overflow-y:auto;flex:1}
.map-group{border-bottom:1px solid var(--border)}
.map-header{padding:10px 16px;font-family:"Syne",sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:color 0.15s}
.map-header:hover{color:var(--text)}
.map-header.active{color:var(--accent)}
.map-count{background:var(--border);padding:2px 7px;font-size:0.7rem;border-radius:2px}
.panel-list{display:none}
.panel-list.open{display:block}
.panel-item{padding:9px 16px 9px 24px;font-size:0.82rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background 0.1s;border-left:2px solid transparent}
.panel-item:hover{background:var(--surface)}
.panel-item.selected{background:var(--surface);border-left-color:var(--accent);color:var(--accent)}
.panel-clue{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-clue.hidden-clue{font-style:italic;opacity:0.55}
.sym-strip{display:flex;align-items:center;gap:1px;flex-shrink:0}
.sym-strip span{font-family:"Lingo2",monospace;font-size:1.15em;color:var(--accent2);line-height:1}
.sym-strip .bar-sep{font-family:"Space Mono",monospace;font-size:0.75em;color:var(--muted);padding:0 2px}
.main{display:flex;flex-direction:column}
.top-bar{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center}
.top-bar input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:"Space Mono",monospace;font-size:1.05rem;padding:12px 16px;outline:none;transition:border-color 0.15s}
.top-bar input:focus{border-color:var(--accent)}
.top-bar input::placeholder{color:var(--muted)}
.content{flex:1;padding:32px}
.panel-card{background:var(--panel-bg);border:1px solid var(--border);padding:32px;max-width:660px;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-label{font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.card-clue{font-family:"Syne",sans-serif;font-size:3.2rem;font-weight:800;letter-spacing:-0.03em;color:var(--text);line-height:1;margin-bottom:24px}
.card-clue.missing{font-style:italic;opacity:0.4;font-size:1.1rem;margin-bottom:6px}
.card-missing-note{font-size:0.72rem;color:var(--muted);margin-bottom:24px;font-style:italic}
.modifier-block{margin-bottom:24px}
.glyph-strip{display:flex;align-items:center;gap:4px;padding:14px 18px;background:rgba(110,181,255,0.07);border:1px solid rgba(110,181,255,0.2);margin-bottom:10px;flex-wrap:wrap}
.glyph-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.glyph-cell .glyph-char{font-family:"Lingo2",monospace;font-size:3.2rem;color:var(--accent2);line-height:1}
.glyph-cell .glyph-dot-label{font-size:0.72rem;color:var(--accent2);opacity:0.9;font-weight:700;letter-spacing:0.05em}
.glyph-bar-sep{display:flex;align-items:center;padding:0 8px;color:rgba(255,200,80,0.6);font-size:1.6rem;font-weight:300;line-height:1;align-self:stretch}
.modifier-details{display:flex;flex-direction:column;gap:6px}
.mod-detail-row{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;background:rgba(110,181,255,0.03);border-left:2px solid rgba(110,181,255,0.25)}
.mod-detail-row.bar-hint{background:rgba(255,200,80,0.04);border-left-color:rgba(255,200,80,0.4);font-size:0.75rem;color:rgba(255,200,80,0.75);padding:7px 13px;font-style:italic}
.mod-detail-glyph{font-family:"Lingo2",monospace;font-size:1.5rem;color:var(--accent2);line-height:1;flex-shrink:0;width:26px;text-align:center}
.mod-detail-text{flex:1}
.mod-detail-name{font-family:"Syne",sans-serif;font-size:0.9rem;font-weight:700;color:var(--accent2);margin-bottom:2px}
.mod-detail-desc{font-size:0.8rem;color:var(--text);line-height:1.4}
.mod-detail-meta{font-size:0.7rem;color:var(--muted);margin-top:3px;font-style:italic}
.mod-detail-dots{font-size:0.8rem;color:var(--accent2);margin-top:4px;font-weight:700}
.divider{height:1px;background:var(--border);margin:24px 0;position:relative}
.divider::after{content:"\25BC";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--panel-bg);padding:0 8px;color:var(--muted);font-size:0.65rem}
/* Spoiler: blanks and blurred answer stacked on top of each other */
.spoiler-outer{position:relative;display:inline-block;margin-bottom:8px;cursor:pointer;user-select:none}
.spoiler-blanks{font-family:"Syne",sans-serif;font-size:3.5rem;font-weight:800;color:var(--muted);line-height:1;letter-spacing:0.05em;display:block}
.spoiler-answer{font-family:"Syne",sans-serif;font-size:3.5rem;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-0.03em;position:absolute;top:0;left:0;filter:blur(14px);transition:filter 0.25s}
.spoiler-outer.revealed .spoiler-blanks{visibility:hidden}
.spoiler-outer.revealed .spoiler-answer{filter:none}
.spoiler-hint{font-size:0.7rem;color:var(--muted);font-style:italic;margin-bottom:0}
.card-answer-plain{font-family:"Syne",sans-serif;font-size:3.5rem;font-weight:800;letter-spacing:-0.03em;color:var(--accent);line-height:1}
.card-id{margin-top:24px;font-size:0.7rem;color:var(--muted)}
/* Search results */
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.result-card{background:var(--panel-bg);border:1px solid var(--border);padding:20px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;display:flex;flex-direction:column;gap:4px}
.result-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.rc-map{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.rc-clue{font-family:"Syne",sans-serif;font-size:1.5rem;font-weight:800;color:var(--text)}
.rc-clue.missing{font-style:italic;opacity:0.5;font-size:0.92rem}
.rc-modifier{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:4px 0}
.rc-glyph{font-family:"Lingo2",monospace;font-size:1.5rem;color:var(--accent2);line-height:1}
.rc-bar{color:var(--muted);font-size:0.85rem;padding:0 2px}
.rc-sym-name{font-size:0.68rem;color:var(--accent2)}
.rc-answer{font-family:"Syne",sans-serif;font-size:0.85rem;font-weight:700;color:var(--muted);letter-spacing:0.18em;margin-top:6px}
/* Export/Import toolbar */
.data-toolbar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.btn-tool{background:var(--surface);color:var(--accent2);border:1px solid var(--border);font-family:"Syne",sans-serif;font-weight:700;font-size:0.78rem;padding:8px 16px;cursor:pointer;letter-spacing:0.05em;transition:border-color 0.15s,color 0.15s}
.btn-tool:hover{border-color:var(--accent2);color:var(--text)}
/* Upload */
.upload-zone{max-width:580px;margin:0 auto;text-align:center}
.upload-zone h2{font-family:"Syne",sans-serif;font-size:1.7rem;font-weight:800;margin-bottom:12px;color:var(--text)}
.upload-zone p{color:var(--muted);font-size:0.85rem;line-height:1.7;margin-bottom:24px}
.upload-zone code{background:var(--surface);border:1px solid var(--border);padding:2px 6px;font-size:0.8rem;color:var(--accent2)}
.upload-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border)}
.upload-tab{flex:1;padding:10px;font-family:"Syne",sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;text-align:center;color:var(--muted);transition:background 0.15s,color 0.15s;border:none;background:none;letter-spacing:0.05em}
.upload-tab.active{background:var(--surface);color:var(--accent)}
.upload-panel{display:none}
.upload-panel.active{display:block}
.drop-area{border:2px dashed var(--border);padding:48px 32px;margin-bottom:16px;transition:border-color 0.15s,background 0.15s;cursor:pointer;position:relative}
.drop-area:hover,.drop-area.drag-over{border-color:var(--accent);background:rgba(127,255,110,0.03)}
.drop-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{font-size:2.2rem;margin-bottom:12px}
.drop-text{font-size:0.85rem;color:var(--muted)}
.drop-text strong{color:var(--accent)}
.or-divider{color:var(--muted);font-size:0.75rem;margin:16px 0}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:"Space Mono",monospace;font-size:0.8rem;padding:12px;resize:vertical;min-height:120px;outline:none}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
button.btn-primary{background:var(--accent);color:#000;border:none;font-family:"Syne",sans-serif;font-weight:700;font-size:0.9rem;padding:12px 24px;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.15s;margin-top:12px}
button.btn-primary:hover{opacity:0.85}
.stats{font-size:0.75rem;color:var(--muted);margin-bottom:16px}
.stats span{color:var(--accent)}
.legend{margin-top:32px;max-width:820px}
.legend h3{font-family:"Syne",sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.legend-item{background:var(--surface);border:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:12px}
.legend-glyph{font-family:"Lingo2",monospace;font-size:2.1rem;color:var(--accent2);line-height:1;flex-shrink:0;width:34px;text-align:center}
.legend-name{font-size:0.75rem;font-weight:700;color:var(--accent2);font-family:"Syne",sans-serif}
.legend-desc{font-size:0.65rem;color:var(--muted);line-height:1.4;margin-top:2px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border)}

</style>

<body>
<header><h1>LINGO 2</h1><span>answer viewer</span></header>

<div class="layout" id="app-layout" style="display:none">
  <aside class="sidebar">
    <div class="search-box">
      <input type="text" id="sidebar-search" placeholder="filter panels..." autocomplete="off">
      <label class="search-toggle"><input type="checkbox" id="search-answers"> also search answers</label>
      <label class="search-toggle"><input type="checkbox" id="sort-alpha"> sort alphabetically</label>
    </div>
    <div class="map-list" id="map-list"></div>
  </aside>
  <main class="main">
    <div class="top-bar"><input type="text" id="main-search" placeholder="search by clue word..." autocomplete="off"></div>
    <div class="content" id="main-content"></div>
  </main>
</div>
<div class="content" id="upload-view" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 67px)">
  <div class="upload-zone">
    <h2>Load panel data</h2>
    <p>Load from extracted <code>.tscn</code> game files, or from a pre-exported <code>.json</code> file.</p>
    <div class="upload-tabs">
      <button class="upload-tab active" onclick="switchTab('json')">Load Data</button>
      <button class="upload-tab" onclick="switchTab('tscn')">From TSCN Files</button>
    </div>
    <div class="upload-panel active" id="tab-json">
      <div class="drop-area" id="drop-area-json">
        <input type="file" id="json-input" accept=".json">
        <div class="drop-icon">&#128196;</div>
        <div class="drop-text"><strong>Drop lingo2_panels.json here</strong><br>or click to browse</div>
      </div>
      <p style="font-size:0.75rem;color:var(--muted);margin-top:8px">
        Or load from URL:<br>
        <input type="text" id="json-url-input" value="https://0x0054.github.io/lingo2_answer_viewer/lingo2_panels.json" style="width:100%;margin-top:6px;font-size:0.75rem;padding:8px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;outline:none">
      </p>
      <button class="btn-primary" onclick="loadJsonUrl()">Load from URL</button>
    </div>
    <div class="upload-panel" id="tab-tscn">
      <div class="drop-area" id="drop-area">
        <input type="file" id="file-input" multiple accept=".tscn,.txt">
        <div class="drop-icon">&#128193;</div>
        <div class="drop-text"><strong>Drop .tscn files here</strong><br>or click to browse</div>
      </div>
      <div class="or-divider">&mdash; or paste raw content below &mdash;</div>
      <textarea id="paste-input" placeholder="Paste .tscn file content here..."></textarea><br>
      <button class="btn-primary" onclick="parsePasted()">Parse Pasted Content</button>
    </div>
    <div id="parse-error" style="color:#ff6e9c;font-size:0.8rem;margin-top:12px;display:none"></div>
  </div>
</div>

<script>

const EMBED_MAP = {
  ":Syn":"\u0296",":Ant":"\u0296\u0313",":Add":"\u0298",":Rem":"\u0298\u0313",
  ":Adp":"\u0298\u0312",":Hom":"\u029a",":Rhy":"\u029a\u0312",":Cat":"\u029b",
  ":Exa":"\u029b\u0313",":Par":"\u0293",":Who":"\u0293\u0313",":Plu":"\u029c",
  ":Sin":"\u029c\u0313",":Int":"\u0292",":Dim":"\u0292\u0313",":IntSquig":"\u0292\u0312",":Ene":"\u0294",
  ":Enr":"\u0294\u0313",":Ent":"\u0294\u0312",":Swe":"\u0291",":Swu":"\u0291\u0313",
  ":Mas":"\u0295",":Fem":"\u0295\u0313",":Old":"\u0297",":You":"\u0297\u0313",
  ":Ten":"\u0297\u0312",":Sou":"\u0290",":Sor":"\u0290\u0313",":Ana":"\u029e",
  ":Job":"\u029f",":Emp":"\u029f\u0313",":Sur":"\u02a1",":Srr":"\u02a1\u0313",
  ":Cha":"\u00d8",":Eva":"\u029d",":EvaBrk":"\u029d\u0313",
  ":Smi":"\u0040",":Sad":"\u0040\u0313",":Sas":"\u0040\u0312",
  ":Brk":"\u026E",
  ":Dot":"\u0307",":DotBrk":"\u0269\u0313",
  ":Odd":"\u003f"
};
// Map raw tscn tokens to canonical codes
// @ = :Smi (with bracket = :Sad, with squiggle = :Sas)
// bracket flag on any code: look up bracketed variant in BRACKET_MAP
const BRACKET_MAP = {
  ":Syn":":Ant",":Add":":Rem",":Adp":":Adp",":Hom":":Hom",":Cat":":Exa",
  ":Par":":Who",":Plu":":Sin",":Int":":Dim",":Ene":":Enr",":Swe":":Swu",
  ":Mas":":Fem",":Old":":You",":Sou":":Sor",":Sur":":Srr",":Job":":Emp",
  ":Eva":":EvaBrk","@":":Sad",":Dot":":DotBrk",":Brk":":Brk"
};
const SQUIGGLE_MAP = {
  ":Add":":Adp",":Hom":":Rhy",":Ene":":Ent",":Old":":Ten", ":Int":":IntSquig",
  ":Mas":":MasSquig",":Plu":":PluSquig","@":":Sas",":Brk":":BrkSquig"
};
const MODIFIER_INFO = {
  "":{ name:"Empty", desc:"Type the clue word as-is" },
  ":Syn":{ name:"Sun", desc:"Synonym of the clue" },
  ":Ant":{ name:"Sun + Bracket", desc:"Antonym of the clue" },
  ":Brk":{ name:"Square Bracket (standalone)", desc:"Reverse the clue word (e.g. 'on' \u2192 'no')" },
  ":Hom":{ name:"Eye", desc:"Homophone or homonym of the clue" },
  ":Rhy":{ name:"Eye + Squiggle", desc:"Rhymes with the clue" },
  ":Add":{ name:"Hexagons", desc:"Add letter(s) to the clue" },
  ":Rem":{ name:"Hexagons + Bracket", desc:"Remove letter(s) from the clue" },
  ":Adp":{ name:"Hexagons + Squiggle", desc:"Add or remove lines from a letter in the clue" },
  ":Par":{ name:"Box", desc:"Clue is a component of the answer" },
  ":Who":{ name:"Box + Bracket", desc:"Answer is a component of the clue" },
  ":Cat":{ name:"Snowflakes", desc:"Clue is a type of the answer (find the category)" },
  ":Exa":{ name:"Snowflakes + Bracket", desc:"Answer is a type of the clue (find an example)" },
  ":Int":{ name:"Pyramid", desc:"Stronger or more intense form of the clue" },
  ":Dim":{ name:"Pyramid + Bracket", desc:"Weaker or softer form of the clue" },
  ":Plu":{ name:"Planet", desc:"Plural or multiple of the clue" },
  ":Sin":{ name:"Planet + Bracket", desc:"Singular form of the clue" },
  ":Smi":{ name:"Smiley", desc:"Answer comes from environmental or external clues" },
  ":Sad":{ name:"Smiley + Bracket", desc:"Environmental clues read right-to-left" },
  ":Sas":{ name:"Smiley + Squiggle", desc:"Search for missing data in the environment" },
  ":Old":{ name:"Spiral", desc:"Aged or older form of the clue" },
  ":You":{ name:"Spiral + Bracket", desc:"Younger or earlier form of the clue" },
  ":Ten":{ name:"Spiral + Squiggle", desc:"Tense change of the clue" },
  ":Mas":{ name:"Kerplunk", desc:"Masculine form of the clue" },
  ":Fem":{ name:"Kerplunk + Bracket", desc:"Feminine form of the clue" },
  ":Cha":{ name:"Empty Set", desc:"A change or transformation of the clue" },
  ":Ana":{ name:"Jackhammer", desc:"Anagram of the clue" },
  ":Sou":{ name:"Speaker", desc:"Sound made by the clue" },
  ":Sor":{ name:"Speaker + Bracket", desc:"Source of the sound (clue is a sound, answer makes it)" },
  ":Sur":{ name:"Stars", desc:"Something that contains or surrounds the clue" },
  ":Srr":{ name:"Stars + Bracket", desc:"The clue contains or surrounds the answer" },
  ":Ene":{ name:"Cross", desc:"Add energy to the clue (heat, charge, kinetic)" },
  ":Enr":{ name:"Cross + Bracket", desc:"Remove energy from the clue" },
  ":Ent":{ name:"Cross + Squiggle", desc:"Energy transform variant" },
  ":Swe":{ name:"Rollercoaster", desc:"Sweeten the clue \u2014 add sugar in some way" },
  ":Swu":{ name:"Rollercoaster + Bracket", desc:"Remove sweetness from the clue" },
  ":Job":{ name:"Stethoscope", desc:"Action performed by the clue" },
  ":Emp":{ name:"Stethoscope + Bracket", desc:"Who performs the action (clue is an action)" },
  ":Eva":{ name:"Salmon", desc:"Interpret a keyword inside the clue as a cryptic crossword instruction" },
  ":Dot":{ name:"Dot", desc:"Duplicate the clue word \u2014 one dot means two copies, two dots means three copies, etc." },
  ":DotBrk":{ name:"Dot + Bracket", desc:"Reverse of Dot \u2014 clue is a repeated word, answer is the single instance" },
  ":EvaBrk":{ name:"Salmon + Bracket", desc:"Opposite of the cryptic keyword instruction \u2014 inversion rules follow the corresponding symbol" },
  ":IntSquig":{ name:"Pyramid + Squiggle", desc:"Add an intensifying suffix or prefix to the clue word (e.g. 'fast' \u2192 'faster')" },
  ":Squig":{ name:"Squiggle (standalone)", desc:"Squiggle modifier applied standalone" },
  ":MasSquig":{ name:"Kerplunk + Squiggle", desc:"Gender-neutral form of the clue" },
  ":PluSquig":{ name:"Planet + Squiggle", desc:"Literally add an s to the end of the clue word" },
  ":BrkSquig":{ name:"Bracket + Squiggle", desc:"Combined bracket and squiggle modifier" },
  ":Odd":{ name:"?", desc:"Wildcard \u2014 could represent any symbol in any state" },
};

function parseSymbol(sym) {
  if (!sym || sym === "?") return [];
  sym = sym.trim();
  const parts = sym.split("|");
  return parts.map(part => {
    part = part.trim();
    const tokens = [];
    const words = part.split(/\s+/);
    for (const word of words) {
      if (!word) continue;
      // Purely standalone dots/carets/tildes
      if (/^[.\^~]+$/.test(word)) {
        for (const ch of word) {
          if (ch === '.') tokens.push(makeToken(':Dot', false, 0));
          else if (ch === '^') tokens.push(makeToken(':Brk', false, 0));
          else if (ch === '~') tokens.push(makeToken(':Squig', false, 0));
        }
        continue;
      }
      // Match :Code or @ tokens with optional ^ (bracket) and dots
      const re = /(:[A-Za-z]+|@)([\^~])?(\.+)?/g;
      let m, pos = 0;
      while ((m = re.exec(word)) !== null) {
        const before = word.slice(pos, m.index);
        for (const ch of before) {
          if (ch === '.') tokens.push(makeToken(':Dot', false, 0));
          else if (ch === '^') tokens.push(makeToken(':Brk', false, 0));
          else if (ch === '~') tokens.push(makeToken(':Squig', false, 0));
        }
        let code = m[1];
        // m[2] is the modifier char (^ or ~), handled below
        const dots = (m[3] || '').length;
        // Resolve modifier FIRST (using raw token) then fall back to plain @ -> :Smi
        const modChar = m[2];
        if (modChar === '^') {
          code = BRACKET_MAP[code] !== undefined ? BRACKET_MAP[code] : (code + 'Brk');
        } else if (modChar === '~') {
          code = SQUIGGLE_MAP[code] !== undefined ? SQUIGGLE_MAP[code] : (code + 'Squig');
        } else if (code === '@') {
          code = ':Smi';
        }
        tokens.push(makeToken(code, false, dots));
        pos = m.index + m[0].length;
      }
      const after = word.slice(pos);
      for (const ch of after) {
        if (ch === '.') tokens.push(makeToken(':Dot', false, 0));
        else if (ch === '^') tokens.push(makeToken(':Brk', false, 0));
        else if (ch === '~') tokens.push(makeToken(':Squig', false, 0));
      }
    }
    return tokens;
  });
}

function makeToken(code, _bracket, dots) {
  const info = MODIFIER_INFO[code] || { name: code, desc: "Unknown modifier" };
  const glyph = EMBED_MAP[code] || null;
  return { code, glyph, name: info.name, desc: info.desc, dots };
}

function parseTscn(content, filename) {
  const panels = [];
  const mapName = filename.replace(/\.tscn$/i,"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  const blocks = content.split(/(?=\[node\s)/);
  for (const block of blocks) {
    if (!block.includes("clue =") && !block.includes("answer =")) continue;
    const nm  = block.match(/\[node name="([^"]+)"/);
    const par = block.match(/parent="([^"]+)"/);
    const cl  = block.match(/^clue = "([^"]*)"/m);
    const an  = block.match(/^answer = "([^"]*)"/m);
    const sy  = block.match(/^symbol = "([^"]*)"/m);
    const ml  = block.match(/^missing_line = "([^"]*)"/m);
    if (!cl && !an) continue;
    const name = nm ? nm[1] : "?";
    const parent = par ? par[1] : "";
    panels.push({
      id: name, parent,
      uid: mapName + "\x00" + parent + "\x00" + name,
      map: mapName,
      clue: cl ? cl[1] : "",
      answer: an ? an[1] : "",
      symbol: sy ? sy[1] : "",
      missingLine: ml ? ml[1] : null,
    });
  }
  return panels;
}

let allPanels = [], openMaps = new Set(), selectedUid = null;

function loadPanels(panels) {
  allPanels = panels;
  document.getElementById("upload-view").style.display = "none";
  document.getElementById("app-layout").style.display = "grid";
  renderSidebar(); showHome();
}

function groupByMap(panels) {
  const g = {};
  for (const p of panels) { if (!g[p.map]) g[p.map]=[]; g[p.map].push(p); }
  return g;
}

function matchesSearch(panel, q, includeAnswers) {
  const ql = q.toLowerCase();
  const clueHidden = panel.missingLine === "clue";
  if (!clueHidden && panel.clue.toLowerCase().includes(ql)) return true;
  if (clueHidden && panel.answer.toLowerCase().includes(ql)) return true;
  if (includeAnswers) {
    if (clueHidden && panel.clue.toLowerCase().includes(ql)) return true;
    if (!clueHidden && panel.answer.toLowerCase().includes(ql)) return true;
  }
  return false;
}

function sidebarGlyphStrip(symbol) {
  const segs = parseSymbol(symbol);
  if (!segs.length || !segs.some(s => s.length)) return '';
  let parts = [];
  for (let si = 0; si < segs.length; si++) {
    if (si > 0) parts.push('<span class="bar-sep">|</span>');
    for (const mod of segs[si]) {
      if (mod.glyph) parts.push('<span>' + mod.glyph + '</span>');
    }
  }
  return '<span class="sym-strip">' + parts.join('') + '</span>';
}

function renderSidebar() {
  const q = document.getElementById("sidebar-search").value.toLowerCase().trim();
  const incAns = document.getElementById("search-answers").checked;
  const sortAlpha = document.getElementById("sort-alpha").checked;
  let filtered = q ? allPanels.filter(p => matchesSearch(p, q, incAns)) : allPanels;
  if (sortAlpha) {
    filtered = [...filtered].sort((a, b) => {
      const ca = (a.missingLine === "clue" ? a.answer : a.clue).toLowerCase();
      const cb = (b.missingLine === "clue" ? b.answer : b.clue).toLowerCase();
      return ca.localeCompare(cb);
    });
  }
  const groups = groupByMap(filtered);
  const list = document.getElementById("map-list");
  list.innerHTML = "";
  for (const [map, mapPanels] of Object.entries(groups)) {
    const grp = document.createElement("div"); grp.className = "map-group";
    const hdr = document.createElement("div");
    hdr.className = "map-header" + (openMaps.has(map) ? " active" : "");
    hdr.innerHTML = '<span>' + map + '</span><span class="map-count">' + mapPanels.length + '</span>';
    hdr.onclick = () => { openMaps.has(map) ? openMaps.delete(map) : openMaps.add(map); renderSidebar(); };
    const pl = document.createElement("div");
    pl.className = "panel-list" + (openMaps.has(map) ? " open" : "");
    for (const panel of mapPanels) {
      const item = document.createElement("div");
      item.className = "panel-item" + (selectedUid === panel.uid ? " selected" : "");
      const clueHidden = panel.missingLine === "clue";
      const label = clueHidden ? "(hidden clue)" : (panel.clue || panel.id);
      const cls = clueHidden ? "panel-clue hidden-clue" : "panel-clue";
      item.innerHTML = '<span class="' + cls + '">' + label + '</span>' + sidebarGlyphStrip(panel.symbol);
      item.onclick = () => showPanel(panel);
      pl.appendChild(item);
    }
    grp.appendChild(hdr); grp.appendChild(pl); list.appendChild(grp);
  }
}

function renderModifiers(symbol) {
  const segs = parseSymbol(symbol);
  const hasMods = segs.some(s => s.length > 0);
  if (!hasMods) return '<div style="margin-bottom:24px;font-size:0.82rem;color:var(--muted)">no modifier \u2014 type the clue word as-is</div>';

  let stripHtml = '<div class="glyph-strip">';
  for (let si = 0; si < segs.length; si++) {
    if (si > 0) stripHtml += '<div class="glyph-bar-sep">|</div>';
    for (const mod of segs[si]) {
      stripHtml += '<div class="glyph-cell">';
      stripHtml += '<span class="glyph-char">' + (mod.glyph || '?') + '</span>';
      if (mod.dots > 0) stripHtml += '<span class="glyph-dot-label">\u00d7' + (mod.dots + 1) + '</span>';
      stripHtml += '</div>';
    }
  }
  stripHtml += '</div>';

  let detailHtml = '<div class="modifier-details">';
  for (let si = 0; si < segs.length; si++) {
    if (si > 0) detailHtml += '<div class="mod-detail-row bar-hint">The Bar: split the clue here \u2014 apply the symbol on each side to its half, then recombine the results</div>';
    for (const mod of segs[si]) {
      detailHtml += '<div class="mod-detail-row">';
      detailHtml += '<div class="mod-detail-glyph">' + (mod.glyph || '?') + '</div>';
      detailHtml += '<div class="mod-detail-text">';
      detailHtml += '<div class="mod-detail-name">' + mod.name + '</div>';
      detailHtml += '<div class="mod-detail-desc">' + mod.desc + '</div>';
      if (mod.dots > 0) detailHtml += '<div class="mod-detail-dots">\u2022 Applied \u00d7' + (mod.dots + 1) + ' (symbol repeated ' + mod.dots + ' extra time' + (mod.dots > 1 ? 's' : '') + ')</div>';
      detailHtml += '<div class="mod-detail-meta">' + mod.code + (mod.dots > 0 ? '.'.repeat(mod.dots) : '') + '</div>';
      detailHtml += '</div></div>';
    }
  }
  detailHtml += '</div>';

  return '<div class="modifier-block">' + stripHtml + detailHtml + '</div>';
}

function renderSpoiler(text, label) {
  const id = "sp" + Math.random().toString(36).slice(2,8);
  // blanks: one underscore per char, space chars become a wider gap
  const blanks = text.split("").map(c => c === " " ? "\u2003" : "_").join("");
  return '<div class="spoiler-outer" id="' + id + '" onclick="toggleSpoiler(\'' + id + '\')">'
    + '<span class="spoiler-blanks">' + blanks + '</span>'
    + '<span class="spoiler-answer">' + text + '</span>'
    + '</div>'
    + '<div class="spoiler-hint">click to reveal ' + (label||"answer") + '</div>';
}

function toggleSpoiler(id) {
  document.getElementById(id).classList.toggle("revealed");
}

function showPanel(panel) {
  selectedUid = panel.uid;
  document.getElementById("main-search").value = "";
  renderSidebar();
  const clueHidden = panel.missingLine === "clue";

  let clueSection, answerSection;
  if (clueHidden) {
    clueSection = '<div class="card-clue missing">(clue hidden in game)</div>'
                + '<div class="card-missing-note">Only the answer field is shown to the player on this panel.</div>';
    answerSection = '<div class="card-label">answer (visible in game)</div>'
                  + '<div class="card-answer-plain">' + panel.answer + '</div>'
                  + '<div style="margin-top:24px"><div class="card-label">hidden clue (spoiler)</div>'
                  + renderSpoiler(panel.clue, "clue") + '</div>';
  } else {
    clueSection = '<div class="card-clue">' + (panel.clue || "") + '</div>';
    answerSection = '<div class="card-label">answer</div>' + renderSpoiler(panel.answer, "answer");
  }

  document.getElementById("main-content").innerHTML =
    '<div class="panel-card">'
    + '<div class="card-label">clue</div>' + clueSection
    + '<div class="card-label">modifier</div>' + renderModifiers(panel.symbol)
    + '<div class="divider"></div>'
    + answerSection
    + '<div class="card-id">id: ' + panel.id + ' \u00b7 parent: ' + panel.parent + ' \u00b7 map: ' + panel.map + '</div>'
    + '</div>' + renderLegend();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showHome() {
  const groups = groupByMap(allPanels);
  document.getElementById("main-content").innerHTML =
    '<div class="stats"><span>' + allPanels.length + '</span> panels across <span>' + Object.keys(groups).length + '</span> maps loaded.</div>'
    + '<div class="data-toolbar">'
    + '<button class="btn-tool" onclick="exportJson()">&#8595; Export as JSON</button>'
    + '</div>'
    + renderLegend();
}

function exportJson() {
  const json = JSON.stringify(allPanels, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "lingo2_panels.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderLegend() {
  const items = Object.entries(EMBED_MAP).map(([code, glyph]) => {
    const info = MODIFIER_INFO[code] || { name: code, desc: "" };
    return '<div class="legend-item">'
      + '<div class="legend-glyph">' + (glyph||'?') + '</div>'
      + '<div class="legend-text"><div class="legend-name">' + info.name + '</div><div class="legend-desc">' + info.desc + '</div></div>'
      + '</div>';
  }).join("");
  return '<div class="legend"><h3>Modifier Reference</h3><div class="legend-grid">' + items + '</div></div>';
}

function showSearch(q) {
  if (!q.trim()) { showHome(); return; }
  const incAns = document.getElementById("search-answers").checked;
  const res = allPanels.filter(p => matchesSearch(p, q, incAns));
  if (!res.length) { document.getElementById("main-content").innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:32px 0">No panels found.</div>'; return; }
  const cards = res.map(p => {
    const segs = parseSymbol(p.symbol);
    let modHtml = '<div class="rc-modifier">';
    for (let si = 0; si < segs.length; si++) {
      if (si > 0) modHtml += '<span class="rc-bar">|</span>';
      for (const mod of segs[si]) modHtml += '<span class="rc-glyph">' + (mod.glyph||'') + '</span>';
    }
    const names = segs.map(s => s.map(m => m.name).join("+")).join("|");
    modHtml += '<span class="rc-sym-name">' + names + '</span></div>';
    const clueHidden = p.missingLine === "clue";
    const clueHtml = clueHidden ? '<div class="rc-clue missing">(hidden clue)</div>' : '<div class="rc-clue">' + p.clue + '</div>';
    const blanks = p.answer.split("").map(c => c === " " ? " " : "_").join("");
    return '<div class="result-card" data-uid="' + encodeURIComponent(p.uid) + '">'
      + '<div class="rc-map">' + p.map + (p.parent ? ' \u00b7 ' + p.parent : '') + '</div>'
      + clueHtml + modHtml
      + '<div class="rc-answer">' + blanks + '</div>'
      + '</div>';
  }).join("");
  document.getElementById("main-content").innerHTML = '<div class="stats"><span>' + res.length + '</span> results</div><div class="results-grid">' + cards + '</div>';
  document.querySelectorAll(".result-card").forEach(card => {
    card.onclick = () => {
      const uid = decodeURIComponent(card.dataset.uid);
      const p = allPanels.find(x => x.uid === uid);
      if (p) { openMaps.add(p.map); showPanel(p); }
    };
  });
}

// Tab switching
function switchTab(tab) {
  document.querySelectorAll(".upload-tab").forEach((t,i) => t.classList.toggle("active", (i===0&&tab==="json")||(i===1&&tab==="tscn")));
  document.getElementById("tab-json").classList.toggle("active", tab==="json");
  document.getElementById("tab-tscn").classList.toggle("active", tab==="tscn");
}

// TSCN loading
document.getElementById("file-input").addEventListener("change", async e => { await loadFiles(Array.from(e.target.files)); });
const dropArea = document.getElementById("drop-area");
dropArea.addEventListener("dragover", e => { e.preventDefault(); dropArea.classList.add("drag-over"); });
dropArea.addEventListener("dragleave", () => dropArea.classList.remove("drag-over"));
dropArea.addEventListener("drop", async e => { e.preventDefault(); dropArea.classList.remove("drag-over"); await loadFiles(Array.from(e.dataTransfer.files)); });
async function loadFiles(files) {
  const panels = [];
  for (const f of files) { const t = await f.text(); panels.push(...parseTscn(t, f.name)); }
  if (!panels.length) { showErr("No panels found."); return; }
  loadPanels(panels);
}
function parsePasted() {
  const t = document.getElementById("paste-input").value;
  if (!t.trim()) return;
  const panels = parseTscn(t, "pasted.tscn");
  if (!panels.length) { showErr("No panels found."); return; }
  loadPanels(panels);
}

// JSON loading
document.getElementById("json-input").addEventListener("change", async e => {
  const f = e.target.files[0]; if (!f) return;
  try { const t = await f.text(); loadPanels(JSON.parse(t)); } catch(e) { showErr("Invalid JSON file."); }
});
const dropAreaJson = document.getElementById("drop-area-json");
dropAreaJson.addEventListener("dragover", e => { e.preventDefault(); dropAreaJson.classList.add("drag-over"); });
dropAreaJson.addEventListener("dragleave", () => dropAreaJson.classList.remove("drag-over"));
dropAreaJson.addEventListener("drop", async e => {
  e.preventDefault(); dropAreaJson.classList.remove("drag-over");
  const f = e.dataTransfer.files[0]; if (!f) return;
  try { const t = await f.text(); loadPanels(JSON.parse(t)); } catch(e) { showErr("Invalid JSON file."); }
});
async function loadJsonUrl() {
  const url = document.getElementById("json-url-input").value.trim();
  if (!url) return;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    loadPanels(await r.json());
  } catch(e) { showErr("Could not load JSON from URL: " + e.message); }
}

function showErr(m) { const e = document.getElementById("parse-error"); e.textContent = m; e.style.display = "block"; }
document.getElementById("main-search").addEventListener("input", e => showSearch(e.target.value));
document.getElementById("sidebar-search").addEventListener("input", () => renderSidebar());
document.getElementById("search-answers").addEventListener("change", () => renderSidebar());
document.getElementById("sort-alpha").addEventListener("change", () => renderSidebar());

</script>
